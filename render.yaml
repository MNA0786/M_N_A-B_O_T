# ==================== RENDER.COM CONFIGURATION ====================
# File: render.yaml
# Description: Deployment configuration for Render.com

services:
  - type: web
    name: entertainment-tadka-bot
    env: php
    buildCommand: ""
    startCommand: php index.php
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
    healthCheckPath: /
    autoDeploy: true
    disk:
      name: data
      mountPath: /opt/data
      sizeGB: 1
